<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shareable Quiz Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="max-w-5xl mx-auto bg-white p-6 rounded-2xl shadow">
<h1 class="text-2xl font-bold mb-4">Teacher Quiz Generator</h1>

<!-- TEACHER CREATOR -->
<div id="teacherPanel">
<h2 class="text-xl font-semibold">Create Quiz</h2>

<input id="question" placeholder="Question" class="border p-2 w-full mt-3">

<input id="opt1" placeholder="Option 1" class="border p-2 w-full mt-2">
<input id="opt2" placeholder="Option 2" class="border p-2 w-full mt-2">
<input id="opt3" placeholder="Option 3" class="border p-2 w-full mt-2">
<input id="opt4" placeholder="Option 4" class="border p-2 w-full mt-2">

<label class="block mt-2">Correct option number (1-4)</label>
<input id="answer" type="number" min="1" max="4" class="border p-2 w-full">

<button onclick="addQuestion()" class="bg-green-600 text-white px-4 py-2 mt-3 rounded">Add Question</button>
<button onclick="generateLink()" class="bg-purple-600 text-white px-4 py-2 mt-3 rounded">Generate Quiz Link</button>

<h3 class="font-semibold mt-4">Questions Added</h3>
<div id="questionList"></div>

<div class="mt-4">
<label class="font-semibold">Share this link with students</label>
<input id="quizLink" class="border p-2 w-full mt-2" readonly>
</div>
</div>

<hr class="my-6">

<!-- STUDENT QUIZ -->
<div id="studentArea">
<h2 class="text-xl font-semibold">Student Quiz</h2>

<input id="studentName" placeholder="Enter your name" class="border p-2 w-full mt-2">

<button onclick="startQuiz()" class="bg-blue-500 text-white px-4 py-2 mt-2 rounded">Start Quiz</button>

<form id="quizForm" class="hidden"></form>

<div id="result" class="hidden mt-6"></div>

</div>

</div>

<script>

let questions=[];

function addQuestion(){

 let q=document.getElementById("question").value;
 let o1=document.getElementById("opt1").value;
 let o2=document.getElementById("opt2").value;
 let o3=document.getElementById("opt3").value;
 let o4=document.getElementById("opt4").value;
 let ans=parseInt(document.getElementById("answer").value)-1;

 if(!q || !o1 || !o2 || !o3 || !o4) return alert("Fill all fields");

 let obj={q:q,options:[o1,o2,o3,o4],answer:ans};

 questions.push(obj);

 renderQuestions();

}

function renderQuestions(){

 let box=document.getElementById("questionList");
 box.innerHTML="";

 questions.forEach((item,i)=>{
  box.innerHTML+=`<p>${i+1}. ${item.q}</p>`;
 });

}

function generateLink(){

 if(questions.length===0) return alert("Add questions first");

 let data=btoa(JSON.stringify(questions));

 let url=window.location.origin + window.location.pathname + "?quiz=" + data;

 document.getElementById("quizLink").value=url;

}

function getQuizFromURL(){

 let params=new URLSearchParams(window.location.search);

 if(params.has("quiz")){

  let data=params.get("quiz");

  try{
   questions=JSON.parse(atob(data));
  }catch(e){
   questions=[];
  }

 }

}

function startQuiz(){

 let student=document.getElementById("studentName").value;

 if(student==="") return alert("Enter name");

 if(questions.length===0) return alert("No quiz loaded");

 let form=document.getElementById("quizForm");
 form.innerHTML="";

 questions.forEach((item,i)=>{

  let div=document.createElement("div");

  div.innerHTML=`<p class='font-semibold mt-3'>${i+1}. ${item.q}</p>`;

  item.options.forEach((opt,j)=>{

   let label=document.createElement("label");
   label.className="block";

   label.innerHTML=`<input type='radio' name='q${i}' value='${j}'> ${opt}`;

   div.appendChild(label);

  });

  form.appendChild(div);

 });

 form.innerHTML+=`<button type='button' onclick='submitQuiz()' class='bg-green-600 text-white px-4 py-2 mt-4 rounded'>Submit</button>`;

 form.classList.remove("hidden");

}

function submitQuiz(){

 let correct=0;

 questions.forEach((item,i)=>{

  let sel=document.querySelector(`input[name=q${i}]:checked`);

  if(sel && parseInt(sel.value)===item.answer){
   correct++;
  }

 });

 let total=questions.length;

 let result=document.getElementById("result");
 result.classList.remove("hidden");

 result.innerHTML=`
 <h2 class='text-xl font-bold'>Result</h2>
 <p>Correct: ${correct}</p>
 <p>Incorrect: ${total-correct}</p>
 <p>Score: ${correct}/${total}</p>
 `;

}

getQuizFromURL();

</script>

</body>
</html>
